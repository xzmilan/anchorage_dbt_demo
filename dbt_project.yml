name: anchorage_reporting_demo
version: '1.0.0'
config-version: 2

profile: anchorage_reporting_demo

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  anchorage_reporting_demo:
    Calc_Anchorage:
      +schema: Calc_Anchorage
      +materialized: table
      +tags: ['calc_anchorage']
    Widetable_Anchorage:
      +schema: Widetable_Anchorage
      +materialized: table
      +tags: ['widetable_anchorage']
    Business_View_Anchorage:
      +schema: Business_View_Anchorage
      +materialized: view
      +tags: ['business_view_anchorage']

    # -----------------------------------------------------------------------
    # Reporting & Statements — owned by the Reporting & Statements team.
    # These layers sit on top of Business_View_Anchorage and are NOT owned
    # by the Platform team. They require the period-close gate to pass before
    # they flow into the delivery engine.
    # -----------------------------------------------------------------------
    Reconciliation:
      +schema: Reconciliation_Anchorage
      +materialized: view
      +tags: ['reconciliation']
    Validation:
      +schema: Validation_Anchorage
      +materialized: view
      +tags: ['validation']
    Reporting_Statements:
      +schema: Reporting_Statements_Anchorage
      +materialized: view
      +tags: ['reporting_statements']

